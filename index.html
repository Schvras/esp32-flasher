<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Gravar ESP32</title>

  <script type="module" src="https://unpkg.com/esp-web-tools@8/dist/web/install-button.js?module"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
      background: #0f172a;
      color: white;
    }

    .box {
      background: #1e293b;
      padding: 40px;
      border-radius: 15px;
      display: inline-block;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      opacity: 0.7;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>ESP32 Flasher</h1>
    <p>Conecte o dispositivo via USB</p>

    <esp-web-install-button manifest="manifest.json">
    </esp-web-install-button>
  </div>
</body>
</html>
